name: Test

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run Go tests
        run: |
          cd synconcall
          go test -v ./...

      - name: Validate dev.oncall schedule
        run: |
          cd synconcall
          go run . validate --config=../dev.oncall
